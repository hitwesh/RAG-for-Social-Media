services:

  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: videorag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

  qdrant:
    image: qdrant/qdrant

    ports:
      - "6333:6333"

  redis:
    image: redis

    ports:
      - "6379:6379"
